<!DOCTYPE html>
<html>
<head>
    <title>Appointments</title>
</head>
<body>

<h1>Appointments</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Patient</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    <tr th:each="a : ${appointments}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.patientName}"></td>
        <td th:text="${a.date}"></td>
        <td th:text="${a.status}"></td>
    </tr>

</table>

<br>
<a href="/index.html">Back</a>

</body>
</html>
