<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>
<body>

<h1>Registered Users</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Username</th>
    </tr>

    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
    </tr>

</table>

<br>
<a href="/index.html">Back</a>

</body>
</html>
